version: 1
root:
  id: app-root
  type: box
  props:
    orientation: vertical
  layout:
    cssClasses: ao-layout-preset-modern
  children:
    - type: app.menuBar

    # === Main content (no top playback strip) ===
    - id: main-paned
      type: split
      props:
        orientation: horizontal
        position: 330
      layout:
        vexpand: true
      children:
        - id: left-sidebar
          type: box
          props:
            orientation: vertical
          layout:
            cssClasses: ao-modern-sidebar
          children:
            - type: library.listTree
              layout:
                vexpand: true
        - type: box
          props:
            orientation: vertical
          layout:
            cssClasses: ao-modern-content-shell
          children:
            - type: box
              props:
                orientation: horizontal
                spacing: 6
              layout:
                cssClasses: ao-modern-track-controls-bar
              children:
                - type: track.quickFilter
                  layout:
                    hexpand: true
                - type: track.presentationButton
            - id: workspace-with-inspector
              type: app.workspaceWithInspector
              layout:
                vexpand: true

    # === Modern bottom bar ===
    - type: template
      props:
        templateId: playback.modernBar

templates:
  playback.modernBar:
    type: centerBox
    layout:
      cssClasses: ao-modern-bottom-bar
      hexpand: true
    children:

      # --- Start Slot: image + now-playing text ---
      - type: box
        props:
          orientation: horizontal
          spacing: 12
        layout:
          slot: start
          valign: center
        children:
          - type: playback.image
            props:
              variant: thumbnail
              action: jumpToAlbum
          - type: box
            props:
              orientation: vertical
              spacing: 6
            layout:
              valign: center
              halign: start
            children:
              - type: playback.currentTitleLabel

                props:
                  action: reveal
                layout:
                  cssClasses: ao-nowplaying-title
              - type: playback.currentArtistLabel
                props:
                  action: filterByField
                layout:
                  cssClasses: ao-nowplaying-artist

      # --- Center Slot: Controls + seekbar ---
      - type: box
        props:
          orientation: vertical
          spacing: 8
        layout:
          slot: center
          valign: center
          cssClasses: ao-modern-center-group
        children:
          # Seekbar row
          - type: box
            props:
              orientation: horizontal
              spacing: 8
            layout:
              hexpand: true
            children:
              - type: playback.timeLabel
                props:
                  mode: elapsed
                layout:
                  cssClasses: ao-modern-time-label
              - type: playback.seekSlider
                layout:
                  cssClasses: ao-seekbar-modern
                  hexpand: true
              - type: playback.timeLabel
                props:
                  mode: duration
                layout:
                  cssClasses: ao-modern-time-label
          # Transport controls
          - type: box
            props:
              orientation: horizontal
              spacing: 16
            layout:
              halign: center
            children:
              - type: playback.stopButton
                props:
                  size: small
                layout:
                  cssClasses: ao-play-button-circular
              - type: playback.playPauseButton
                props:
                  size: large
                layout:
                  cssClasses: ao-play-button-prominent

      # --- End Slot: volume + output ---
      - type: box
        props:
          orientation: horizontal
          spacing: 12
        layout:
          slot: end
          valign: center
          halign: end
        children:
          - type: playback.volumeControl
          - type: playback.outputButton
