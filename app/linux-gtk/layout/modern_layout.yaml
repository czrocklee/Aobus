version: 1
root:
  id: app-root
  type: box
  props:
    orientation: vertical
  layout:
    cssClasses: ao-layout-preset-modern
  children:
    - type: app.menuBar

    # === Main content (no top playback strip) ===
    - id: main-paned
      type: split
      props:
        orientation: horizontal
        position: 330
      layout:
        vexpand: true
      children:
        - id: left-sidebar
          type: box
          props:
            orientation: vertical
          layout:
            cssClasses: ao-modern-sidebar
          children:
            - type: library.listTree
              layout:
                vexpand: true
        - type: box
          props:
            orientation: vertical
          layout:
            cssClasses: ao-modern-content-shell
          children:
            - type: box
              props:
                orientation: horizontal
                spacing: 6
              layout:
                cssClasses: ao-modern-track-controls-bar
              children:
                - type: track.quickFilter
                  layout:
                    hexpand: true
                - type: track.presentationButton
            - id: workspace-with-inspector
              type: app.workspaceWithInspector
              layout:
                vexpand: true

    # === Modern bottom bar ===
    - type: template
      props:
        templateId: playback.modernBar

templates:
  playback.modernBar:
    type: box
    props:
      orientation: vertical
    layout:
      cssClasses: ao-modern-bottom-bar-wrapper
      hexpand: true
    children:
      - type: playback.seekSlider
        layout:
          cssClasses: ao-seekbar-modern-full
          hexpand: true

      - type: centerBox
        layout:
          cssClasses: ao-modern-bottom-bar-content
          hexpand: true
        children:

          # --- Start Slot: image + now-playing text ---
          - type: box
            props:
              orientation: horizontal
              spacing: 12
            layout:
              slot: start
              valign: center
            children:
              - type: playback.image
                props:
                  variant: thumbnail
                  action: jumpToAlbum
              - type: box
                props:
                  orientation: vertical
                  spacing: 6
                layout:
                  valign: center
                  halign: start
                children:
                  - type: playback.currentTitleLabel

                    props:
                      action: reveal
                    layout:
                      cssClasses: ao-nowplaying-title
                  - type: playback.currentArtistLabel
                    props:
                      action: filterByField
                    layout:
                      cssClasses: ao-nowplaying-artist

          # --- Center Slot: Controls + time ---
          - type: box
            props:
              orientation: horizontal
              spacing: 16
            layout:
              slot: center
              valign: center
              halign: center
              cssClasses: ao-modern-center-group
            children:
              - type: playback.timeLabel
                props:
                  mode: elapsed
                layout:
                  cssClasses: ao-modern-time-label
              - type: box
                props:
                  orientation: horizontal
                  spacing: 12
                layout:
                  valign: center
                children:
                  - type: playback.shuffleButton
                    props:
                      size: normal
                  - type: playback.previousButton
                    props:
                      size: large
                  - type: playback.playPauseButton
                    props:
                      size: large
                    layout:
                      cssClasses: ao-play-button-prominent
                  - type: playback.nextButton
                    props:
                      size: large
                  - type: playback.repeatButton
                    props:
                      size: normal
              - type: playback.timeLabel
                props:
                  mode: duration
                layout:
                  cssClasses: ao-modern-time-label

          # --- End Slot: volume + output ---
          - type: box
            props:
              orientation: horizontal
              spacing: 12
            layout:
              slot: end
              valign: center
              halign: end
            children:
              - type: playback.volumeControl
              - type: playback.outputButton
