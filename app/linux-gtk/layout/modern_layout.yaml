version: 1
root:
  id: app-root
  type: box
  props:
    orientation: vertical
  children:
    - id: main-paned
      type: split
      props:
        orientation: horizontal
        initialPositionPercent: 0.20
      layout:
        vexpand: true
      children:
        - id: list-pane
          type: box
          props:
            orientation: vertical
          layout:
            cssClasses: ao-list-pane-modern
          children:
            - type: library.listTree
              layout:
                vexpand: true
        - type: box
          props:
            orientation: vertical
          layout:
            cssClasses: ao-content-shell-modern
          children:
            - type: responsiveClass
              props:
                compactMax: 900
                regularMax: 1280
              layout:
                hexpand: true
              children:
                - type: centerBox
                  layout:
                    cssClasses: ao-track-controls-bar-modern
                    hexpand: true
                  children:
                    - type: track.presentationButton
                      props:
                        variant: title
                      layout:
                        slot: start
                        halign: start
                        valign: center
                        cssClasses: ao-section-title-modern-button
                    - type: track.quickFilter
                      layout:
                        slot: center
                        halign: center
                        hexpand: true
                        cssClasses: ao-search-pill-modern
                    - type: box
                      props:
                        orientation: horizontal
                        spacing: 12
                      layout:
                        slot: end
                        halign: end
                        cssClasses: ao-header-stats-modern
                      children:
                        - type: status.selectionInfo
                          layout:
                            valign: center
                        - type: status.trackCount
                          layout:
                            valign: center
            - id: main-workspace-split
              type: collapsibleSplit
              props:
                orientation: horizontal
                initialPositionPercent: 0.2
                revealed: true
              layout:
                vexpand: true
              children:
                - id: workspace
                  type: template
                  props:
                    templateId: tracks.defaultWorkspace
                - id: detail-pane
                  type: template
                  props:
                    templateId: track.defaultDetailPane

    # === Modern bottom bar ===
    - id: modern-bar
      type: template
      props:
        templateId: playback.modernBar
      layout:
        valign: end

templates:
  playback.modernBar:
    type: box
    props:
      orientation: vertical
    layout:
      cssClasses: ao-bottom-bar-wrapper-modern
      hexpand: true
    children:
      - type: playback.seekSlider
        layout:
          cssClasses: ao-seekbar-full-modern
          hexpand: true
          valign: center
      - type: centerBox
        layout:
          cssClasses: ao-bottom-bar-content-modern
          hexpand: true
        children:
          - type: box
            props:
              orientation: horizontal
              spacing: 12
            layout:
              slot: start
              vexpand: true
              valign: fill
            children:
              - type: playback.image
                props:
                  action: jumpToAlbum
                  targetSize: 58
                  forceSquare: true
                layout:
                  vexpand: true
                  halign: center
                  valign: fill
                  cssClasses: ao-nowplaying-image-thumb
                tooltip:
                  type: playback.image
                  props:
                    targetSize: 500
                  layout:
                    cssClasses:
                      - ao-popover-transparent
                      - ao-popover-p-none
                      - ao-popover-rounded-md
                      - ao-rounded-md
                      - ao-opacity-80
              - type: box
                props:
                  orientation: vertical
                  spacing: 4
                layout:
                  halign: start
                  valign: center
                children:
                  - type: playback.currentTitleLabel
                    props:
                      action: reveal
                    layout:
                      cssClasses: ao-nowplaying-title
                  - type: playback.currentArtistLabel
                    props:
                      action: filterByField
                    layout:
                      cssClasses: ao-nowplaying-artist
          - type: box
            props:
              orientation: horizontal
              spacing: 16
            layout:
              slot: center
              valign: center
            children:
              - type: playback.outputDeviceSelector
                layout:
                  widthRequest: 30
                  valign: center
                  cssClasses: ao-output-device-selector-modern
              - type: playback.timeLabel
                props:
                  mode: elapsed
                layout:
                  valign: center
                  cssClasses: ao-time-label-modern
              - type: box
                props:
                  orientation: horizontal
                  spacing: 16
                layout:
                  valign: center
                children:
                  - type: playback.shuffleButton
                  - type: playback.previousButton
                  - type: playback.soulPlayPauseButton
                    props:
                      strokeWidth: 5.0
                      glyphScale: 0.85
                    layout:
                      widthRequest: 60
                      heightRequest: 60
                      halign: center
                      valign: center
                      cssClasses: ao-play-button-prominent
                    tooltip:
                      type: playback.audioPipelinePanel
                      props:
                        variant: tooltip
                  - type: playback.nextButton
                  - type: playback.repeatButton
              - type: playback.timeLabel
                props:
                  mode: duration
                layout:
                  valign: center
                  cssClasses: ao-time-label-modern
              - type: playback.volumeControl
                layout:
                  widthRequest: 30
                  heightRequest: 30
                  valign: center
          - type: box
            props:
              orientation: horizontal
              spacing: 16
            layout:
              slot: end
              valign: center
            children:
              - type: status.activityStatus
                props:
                  variant: ambient
                  idleBehavior: hidden
                  maxTextChars: 34
                layout:
                  halign: end
                  valign: center
              - type: playback.qualityIndicator
                layout:
                  valign: center
              - type: app.menuButton
                props:
                  icon: open-menu-symbolic
                  style: flat
                layout:
                  widthRequest: 28
                  heightRequest: 28
                  halign: center
                  valign: center
