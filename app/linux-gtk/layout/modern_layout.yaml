version: 1
root:
  id: app-root
  type: box
  props:
    orientation: vertical
  layout:
    cssClasses: ao-layout-preset-modern
  children:
    - type: app.menuBar

    # === Main content (no top playback strip) ===
    - id: main-paned
      type: split
      props:
        orientation: horizontal
        position: 330
      layout:
        vexpand: true
      children:
        - id: list-pane
          type: box
          props:
            orientation: vertical
          layout:
            cssClasses: ao-modern-list-pane
          children:
            - type: library.listTree
              layout:
                vexpand: true
        - type: box
          props:
            orientation: vertical
          layout:
            cssClasses: ao-modern-content-shell
          children:
            - type: centerBox
              layout:
                cssClasses: ao-modern-track-controls-bar
                hexpand: true
              children:
                - type: track.presentationButton
                  props:
                    variant: title
                  layout:
                    slot: start
                    halign: start
                    cssClasses: ao-modern-section-title-button
                - type: track.quickFilter
                  layout:
                    slot: center
                    halign: center
                    cssClasses: ao-modern-search-pill
                - type: status.trackCount
                  layout:
                    slot: end
                    halign: end
                    cssClasses: ao-modern-header-stats
            - id: workspace-with-inspector
              type: app.workspaceWithInspector
              layout:
                vexpand: true

    # === Modern bottom bar ===
    - type: template
      props:
        templateId: playback.modernBar

templates:
  playback.modernBar:
    type: box
    props:
      orientation: vertical
    layout:
      cssClasses: ao-modern-bottom-bar-wrapper
      hexpand: true
    children:
      - type: playback.seekSlider
        layout:
          cssClasses: ao-seekbar-modern-full
          hexpand: true
      - type: centerBox
        layout:
          cssClasses: ao-modern-bottom-bar-content
          hexpand: true
        children:
          - type: box
            props:
              orientation: horizontal
              spacing: 12
            layout:
              slot: start
              valign: center
            children:
              - type: playback.image
                props:
                  action: jumpToAlbum
                  targetSize: 48
                  forceSquare: true
                layout:
                  cssClasses: ao-nowplaying-image-thumb
                tooltip:
                  type: playback.image
                  props:
                    targetSize: 500
                  layout:
                    cssClasses:
                      - ao-popover-transparent
                      - ao-popover-p-none
                      - ao-popover-rounded-md
                      - ao-rounded-md
                      - ao-opacity-80
              - type: box
                props:
                  orientation: vertical
                  spacing: 4
                layout:
                  halign: start
                  valign: center
                children:
                  - type: playback.currentTitleLabel
                    props:
                      action: reveal
                    layout:
                      cssClasses: ao-nowplaying-title
                  - type: playback.currentArtistLabel
                    props:
                      action: filterByField
                    layout:
                      cssClasses: ao-nowplaying-artist
          - type: box
            props:
              orientation: horizontal
              spacing: 16
            layout:
              cssClasses: ao-modern-center-group
              halign: center
              slot: center
              valign: center
            children:
              - type: playback.timeLabel
                props:
                  mode: elapsed
                layout:
                  cssClasses: ao-modern-time-label
              - type: box
                props:
                  orientation: horizontal
                  spacing: 12
                layout:
                  valign: center
                children:
                  - type: playback.shuffleButton
                    props:
                      size: normal
                  - type: playback.previousButton
                    props:
                      size: large
                  - type: playback.playPauseButton
                    props:
                      size: large
                    layout:
                      cssClasses: ao-play-button-prominent
                  - type: playback.nextButton
                    props:
                      size: large
                  - type: playback.repeatButton
                    props:
                      size: normal
              - type: playback.timeLabel
                props:
                  mode: duration
                layout:
                  cssClasses: ao-modern-time-label
          - type: box
            props:
              orientation: horizontal
              spacing: 12
            layout:
              halign: end
              slot: end
              valign: center
            children:
              - type: playback.volumeControl
              - type: playback.outputButton
                props:
                  primaryAction: playback.showAudioDeviceSelector
                  secondaryAction: shell.showSystemMenu
                  secondaryLongPressAction: shell.showSoul
                tooltip:
                  type: playback.audioPipelinePanel
                  props:
                    variant: tooltip
