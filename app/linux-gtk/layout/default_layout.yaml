version: 1
root:
  id: app-root
  type: box
  props:
    orientation: vertical
  children:
    - type: app.menuBar
    - id: playback-row
      type: template
      props:
        templateId: playback.defaultBar
      layout:
        cssClasses: ao-playback-strip
    - id: main-paned
      type: split
      props:
        orientation: horizontal
        position: 330
      layout:
        vexpand: true
      children:
        - id: list-pane
          type: box
          props:
            orientation: vertical
          children:
            - type: library.listTree
              layout:
                vexpand: true
            - type: playback.image
              layout:
                minHeight: 50
              tooltip:
                type: playback.image
                props:
                  targetSize: 500
                layout:
                  cssClasses:
                    - ao-popover-transparent
                    - ao-popover-p-none
                    - ao-popover-rounded-md
                    - ao-rounded-md
                    - ao-opacity-80
        - type: box
          props:
            orientation: vertical
          children:
            - type: box
              props:
                orientation: horizontal
                spacing: 6
              layout:
                cssClasses: ao-track-controls-bar
              children:
                - type: track.quickFilter
                  layout:
                    hexpand: true
                - type: track.presentationButton
            - id: workspace-with-inspector
              type: app.workspaceWithInspector
              layout:
                vexpand: true
    - type: box
      props:
        orientation: horizontal
      layout:
        cssClasses: ao-status-region
      children:
        - type: template
          props:
            templateId: status.defaultBar
          layout:
            hexpand: true
templates:
  playback.compactControls:
    type: box
    props:
      orientation: horizontal
      spacing: 4
    children:
      - type: playback.playPauseButton
      - type: playback.stopButton
      - type: playback.timeLabel
  playback.transportGroup:
    type: box
    props:
      orientation: horizontal
      spacing: 0
    layout:
      cssClasses: [linked]
      halign: start
    children:
      - type: playback.playPauseButton
      - type: playback.stopButton
  playback.defaultBar:
    type: box
    props:
      orientation: horizontal
      spacing: 6
    children:
      - type: box
        props:
          orientation: horizontal
          spacing: 8
        layout:
          halign: start
          valign: center
          cssClasses: ao-grouping-region
        children:
          - type: playback.outputButton
            props:
              primaryAction: playback.showAudioDeviceSelector
              secondaryAction: shell.showSystemMenu
              secondaryLongPressAction: shell.showSoul
            tooltip:
              type: playback.audioPipelinePanel
              props:
                variant: tooltip
            layout:
              halign: start
              valign: center
          - type: template
            props:
              templateId: playback.transportGroup
      - type: playback.seekSlider
        layout:
          hexpand: true
      - type: box
        props:
          orientation: horizontal
          spacing: 8
        layout:
          halign: end
          valign: center
          cssClasses: ao-grouping-region
        children:
          - type: playback.timeLabel
          - type: playback.volumeControl
  library.defaultListPane:
    type: box
    props:
      orientation: vertical
    children:
      - type: library.listTree
        layout:
          vexpand: true
      - type: playback.image
        layout:
          minHeight: 50
        tooltip:
          type: playback.image
          props:
            targetSize: 500
          layout:
            cssClasses:
              - ao-popover-transparent
              - ao-popover-p-none
              - ao-popover-rounded-md
              - ao-rounded-md
              - ao-opacity-80
  inspector.defaultPanel:
    type: inspector.panel
  status.defaultBar:
    type: box
    props:
      orientation: horizontal
    layout:
      cssClasses: ao-status-bar
      hexpand: true
    children:
      - type: status.playbackDetails
      - type: spacer
        layout:
          hexpand: true
      - type: status.nowPlaying
      - type: spacer
        layout:
          hexpand: true
      - type: status.statusSlot
      - type: separator
        props:
          orientation: vertical
        layout:
          cssClasses: ao-status-separator
      - type: status.trackCount
  tracks.defaultWorkspace:
    type: tracks.table
    props:
      view: workspace.focused
    layout:
      vexpand: true
  app.defaultLayout:
    type: app.workspaceWithInspector
