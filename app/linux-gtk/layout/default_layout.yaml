version: 1
root:
  id: app-root
  type: box
  props:
    orientation: vertical
  children:
    - id: menu-bar
      type: template
      props:
        templateId: app.defaultMenuBar
    - id: playback-bar
      type: template
      props:
        templateId: playback.defaultBar
      layout:
        valign: start
    - id: main-paned
      type: template
      props:
        templateId: app.defaultMainPaned
    - id: status-bar
      type: template
      props:
        templateId: status.defaultBar

templates:
  app.defaultMenuBar:
    type: app.menuBar

  playback.compactControls:
    type: box
    props:
      orientation: horizontal
      spacing: 4
    children:
      - type: playback.playPauseButton
      - type: playback.stopButton
      - type: playback.timeLabel
  playback.transportGroup:
    type: box
    props:
      orientation: horizontal
      spacing: 0
    layout:
      cssClasses: [linked]
      halign: start
      valign: center
    children:
      - type: playback.playPauseButton
      - type: playback.stopButton
  playback.defaultBar:
    type: box
    props:
      orientation: horizontal
      spacing: 6
    layout:
      cssClasses: ao-playback-strip-classic
    children:
      - type: box
        props:
          orientation: horizontal
          spacing: 8
        layout:
          halign: start
          valign: center
          cssClasses: ao-grouping-region
        children:
          - type: playback.soulButton
            props:
              primaryAction: playback.showAudioDeviceSelector
              secondaryAction: shell.showSystemMenu
              secondaryLongPressAction: shell.showSoul
            tooltip:
              type: playback.audioPipelinePanel
              props:
                variant: tooltip
            layout:
              widthRequest: 32
              heightRequest: 32
              halign: start
              valign: center
          - id: transport-group
            type: template
            props:
              templateId: playback.transportGroup
      - type: playback.seekSlider
        layout:
          hexpand: true
          valign: center
      - type: box
        props:
          orientation: horizontal
          spacing: 8
        layout:
          halign: end
          valign: center
          cssClasses: ao-grouping-region
        children:
          - type: playback.timeLabel
          - type: playback.volumeControl
            layout:
              halign: center
              valign: center
              heightRequest: 24
  library.defaultListPane:
    type: box
    props:
      orientation: vertical
    children:
      - type: library.listTree
        layout:
          vexpand: true
      - type: playback.image
        layout:
          heightRequest: 50
  track.defaultDetailPane:
    id: detail-pane
    type: template
    props:
      templateId: track.selectionDetailPane
  track.selectionDetailPane:
    type: track.detailScope
    layout:
      vexpand: true
    children:
      - type: track.selectionRegion
        props:
          showWhen: any
        layout:
          vexpand: true
        children:
          - type: scroll
            props:
              vscrollPolicy: automatic
            layout:
              vexpand: true
            children:
              - type: box
                props:
                  orientation: vertical
                  spacing: 12
                layout:
                  vexpand: true
                  cssClasses:
                    - ao-detail-pane
                children:
                  - type: box
                    props:
                      orientation: horizontal
                      spacing: 8
                    layout:
                      halign: end
                    children:
                      - type: track.editLock
                      - type: app.actionButton
                        props:
                          label: Properties
                          icon: document-properties-symbolic
                          primaryAction: track.showProperties
                  - type: track.coverArt
                    props:
                      forceSquare: true
                    layout:
                      widthRequest: 250
                      heightRequest: 250
                      halign: center
                  - type: track.metadataField
                    props:
                      field: title
                      label: Title
                  - type: track.metadataField
                    props:
                      field: artist
                      label: Artist
                  - type: track.metadataField
                    props:
                      field: album
                      label: Album
                  - type: track.audioProperty
                    props:
                      property: format
                      label: Format
                  - type: track.audioProperty
                    props:
                      property: sampleRate
                      label: Sample Rate
                  - type: track.audioProperty
                    props:
                      property: channels
                      label: Channels
                  - type: track.audioProperty
                    props:
                      property: bitDepth
                      label: Bit Depth
                  - type: spacer
                    layout:
                      vexpand: true
                  - type: track.tagEditor
  status.defaultBar:
    type: box
    props:
      orientation: horizontal
    layout:
      cssClasses: ao-status-bar-classic
      hexpand: true
    children:
      - type: status.playbackDetails
      - type: spacer
        layout:
          hexpand: true
      - type: status.nowPlaying
      - type: spacer
        layout:
          hexpand: true
      - type: status.statusSlot
      - type: separator
        props:
          orientation: vertical
        layout:
          cssClasses: ao-status-separator
      - type: status.trackCount
  tracks.defaultWorkspace:
    type: tracks.table
    props:
      view: workspace.focused
    layout:
      vexpand: true
  tracks.defaultControlsBar:
    type: box
    props:
      orientation: horizontal
      spacing: 6
    layout:
      cssClasses: ao-track-controls-bar-classic
    children:
      - type: track.quickFilter
        layout:
          hexpand: true
      - type: track.presentationButton
  app.defaultLayout:
    type: collapsibleSplit
    props:
      orientation: horizontal
      position: 850
      revealed: false
    layout:
      vexpand: true
    children:
      - id: workspace
        type: template
        props:
          templateId: tracks.defaultWorkspace
      - id: detail-pane
        type: template
        props:
          templateId: track.defaultDetailPane
  app.defaultContentShell:
    type: box
    props:
      orientation: vertical
    children:
      - id: controls-bar
        type: template
        props:
          templateId: tracks.defaultControlsBar
      - id: layout
        type: template
        props:
          templateId: app.defaultLayout
        layout:
          vexpand: true
  app.defaultMainPaned:
    type: split
    props:
      orientation: horizontal
      position: 330
    layout:
      vexpand: true
    children:
      - id: list-pane
        type: template
        props:
          templateId: library.defaultListPane
      - id: content-shell
        type: template
        props:
          templateId: app.defaultContentShell

