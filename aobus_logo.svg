<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Classic 50/50 Balanced Gradient -->
    <linearGradient id="ao-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF" />
      <stop offset="100%" style="stop-color:#BF5AF2" />
    </linearGradient>
  </defs>
  <style>
    .bg { fill: #0D1117; }
    .a-path { stroke: #F97316; stroke-width: 10; fill: none; stroke-linecap: round; }
    .o-path { stroke: url(#ao-gradient); fill: none; }
  </style>
  <rect class="bg" width="200" height="200" rx="48"/>
  <g transform="translate(22, 65)">
    <!-- Letter a (Amber Orange) -->
    <circle class="a-path" cx="35" cy="35" r="30"/>
    <path class="a-path" d="M65 0 v65"/>
    
    <!-- Letter o (Animated + Balanced Gradient) -->
    <circle class="o-path" cx="122" cy="35" r="30" stroke-width="9">
        <animateTransform attributeName="transform" type="rotate" from="0 122 35" to="360 122 35" dur="7.331s" repeatCount="indefinite" />
        <animate attributeName="stroke-width" values="9;12;9" dur="5.119s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.8;1;0.8" dur="5.119s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
